name: Deploy AskMyNotes

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Run backend tests
        run: |
          # Placeholder: add real tests under backend/tests/
          python -m pytest backend/tests || echo "No tests found, skipping"

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/askmynotes-backend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH into EC2 and redeploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/askmynotes-backend:latest
            docker stop askmynotes-backend || true
            docker rm askmynotes-backend || true
            docker run -d --name askmynotes-backend \
              -p 8000:8000 \
              --env-file /home/${{ secrets.EC2_USER }}/askmynotes.env \
              -v /home/${{ secrets.EC2_USER }}/chroma_db:/app/chroma_db \
              -v /home/${{ secrets.EC2_USER }}/uploaded_pdfs:/app/uploaded_pdfs \
              ${{ secrets.DOCKERHUB_USERNAME }}/askmynotes-backend:latest
